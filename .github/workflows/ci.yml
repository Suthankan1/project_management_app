name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "test", "responsive-pages", "responsive-pages-*" ]
  pull_request:
    branches: [ "main", "master", "test", "responsive-pages", "responsive-pages-*" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Check path changes
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          backend:
            - 'backend/**'
            - '.github/workflows/ci.yml'
          frontend:
            - 'frontend/web/**'
            - '.github/workflows/ci.yml'
          mobile:
            - 'frontend/mobile/**'
            - '.github/workflows/ci.yml'


  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Run Gitleaks Scan
      run: |
        VERSION="8.30.1"
        curl -sSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
        tar -xzf gitleaks.tar.gz gitleaks
        chmod +x ./gitleaks
        ./gitleaks detect --source=. -v --redact
    - name: Run Trivy Security Scan (Backend)
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: './backend'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'
        vuln-type: 'library'

  backend-build:
    name: Build Backend
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Ensure mvnw is executable
      run: chmod +x mvnw
        
    - name: Run Unit Tests
      run: ./mvnw -B test --file pom.xml
        
    - name: Run Integration Tests
      run: ./mvnw -B failsafe:integration-test failsafe:verify --file pom.xml
      
  frontend-build:
    name: Build Frontend
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: ./frontend/web

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: 'frontend/web/.nvmrc'
        cache: 'npm'
        cache-dependency-path: './frontend/web/package-lock.json'

    - name: Cache Next.js Build
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/frontend/web/.next/cache
        key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/web/package-lock.json') }}-${{ hashFiles('frontend/web/**/*.js', 'frontend/web/**/*.jsx', 'frontend/web/**/*.ts', 'frontend/web/**/*.tsx') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('frontend/web/package-lock.json') }}-
        
    - name: Install Dependencies
      run: npm ci

    - name: Audit Dependencies (Explicit Policy)
      run: npm run security-audit

    - name: Lint Next.js App
      run: npm run lint

    - name: Run Frontend Tests
      run: npm run test

    - name: Build Next.js App
      run: npm run build

  mobile-build:
    name: Build Mobile
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: ./frontend/mobile

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: 'frontend/mobile/.nvmrc'
        cache: 'npm'
        cache-dependency-path: './frontend/mobile/package-lock.json'
        
    - name: Install Dependencies
      run: npm ci

    - name: Expo Doctor Check
      run: npx expo-doctor
      continue-on-error: true

    - name: Lint Mobile App
      run: npm run lint

    - name: TypeScript Check
      run: npx tsc --noEmit

    - name: Smoke Check EAS Build Profiles
      run: |
        node -e "
        const fs = require('fs');
        const config = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
        const requiredProfiles = ['development', 'preview', 'production'];
        for (const profile of requiredProfiles) {
          if (!config.build[profile]) {
            console.error('Missing required build profile: ' + profile);
            process.exit(1);
          }
        }
        console.log('EAS build profiles validated successfully!');
        "
