spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Keep migration checksum validation relaxed in local development only.
spring.flyway.validate-on-migrate=false
# Allow local dev to repair Flyway history before migration when needed.
app.flyway.repair-on-startup=${APP_FLYWAY_REPAIR_ON_STARTUP:true}

nplus1.guard.enabled=true
nplus1.guard.warn-threshold=35
nplus1.guard.fail-threshold=120
nplus1.guard.fail-on-exceed=false

# Keep local/dev load tests from silently running with a tiny pool.
# Environment overrides still apply:
# - DB_POOL_MAX_SIZE
# - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:12}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:540000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_TIME:30000}
spring.datasource.hikari.connection-test-query=SELECT 1

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Local development should run cleanly even when only PostgreSQL is available.
# Set these env vars to true when you intentionally run Redis locally.
app.cache.redis.enabled=${APP_CACHE_REDIS_ENABLED:false}
notifications.cache.redis.enabled=${NOTIFICATIONS_CACHE_REDIS_ENABLED:false}

# Cookie Configuration for local development (allow HTTP, Lax sameSite)
app.cookie.secure=false
app.cookie.samesite=Lax
