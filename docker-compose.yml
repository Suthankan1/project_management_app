services:
  # Spring Boot backend — for local development only.
  # Production: deployed to AWS (ECS / App Runner).
  # Database: local Postgres service below.
  # Frontend: deployed to Netlify — not included here.
  backend:
    build: ./backend
    container_name: planora-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/planora_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-planora}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_me_local_db_password}
      # Allow requests from local frontend dev server and Netlify
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Always use Flyway for schema management in Docker/production.
      # Never use ddl-auto=update in a containerised environment — it silently breaks on NOT NULL columns.
      FLYWAY_ENABLED: "true"
      JPA_DDL_AUTO: validate
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - planora-network

  db:
    image: postgres:16-alpine
    container_name: planora-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planora_db}
      POSTGRES_USER: ${POSTGRES_USER:-planora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_db_password}
    volumes:
      - planora-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - planora-network

  redis:
    image: redis:7-alpine
    container_name: planora-redis
    ports:
      - "6379:6379"
    networks:
      - planora-network

networks:
  planora-network:
    driver: bridge

volumes:
  planora-postgres-data:
