services:
  # Spring Boot backend — for local development only.
  # Production: deployed to AWS (ECS / App Runner).
  # Database: Supabase (set SPRING_DATASOURCE_URL to the Supabase JDBC URL).
  # Frontend: deployed to Netlify — not included here.
  backend:
    build: ./backend
    container_name: planora-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Supabase PostgreSQL — use the "Session mode" pooler URL with ?sslmode=require
      # Format: jdbc:postgresql://<host>:5432/<db>?sslmode=require
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      # Allow requests from local frontend dev server and Netlify
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Always use Flyway for schema management in Docker/production.
      # Never use ddl-auto=update in a containerised environment — it silently breaks on NOT NULL columns.
      FLYWAY_ENABLED: "true"
      JPA_DDL_AUTO: validate
    depends_on:
      - redis
    networks:
      - planora-network

  redis:
    image: redis:7-alpine
    container_name: planora-redis
    ports:
      - "6379:6379"
    networks:
      - planora-network

networks:
  planora-network:
    driver: bridge
